<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Híbrida - Knon Grid</title>
    <style>
        /* =========================================
           KNON DESIGN SYSTEM - CORE VARIABLES
           ========================================= */
        :root {
            --knon-bg: #030303;          /* Negro casi absoluto, ahorra batería en pantallas OLED */
            --knon-surface: #0a0a0a;     /* Superficie para tarjetas y fondos secundarios */
            --knon-accent: #f5f5f5;      /* Blanco puro para contrastes premium */
            --knon-brand: #00E5FF;       /* Cyan eléctrico: el toque "startup rebelde" */
            --knon-text: #e0e0e0;        /* Gris muy claro para no cansar la vista */
            --knon-muted: #666666;       /* Para textos secundarios */
        }

        /* Reset y Tipografía */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Elimina el destello azul al tocar en móviles */
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--knon-bg);
            color: var(--knon-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* =========================================
           LA INMERSIÓN (Modo Manhwa Absoluto)
           ========================================= */
        /* Ocultar la barra de scroll para una experiencia de pantalla completa real */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        #gallery-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px; /* Ancho optimizado para simular la pantalla del móvil incluso en PC */
            margin: 0 auto;
            background-color: var(--knon-surface);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8); /* Separa la galería del fondo en pantallas grandes */
        }

        .media-item {
            width: 100%;
            display: block;
            object-fit: cover;
            background-color: var(--knon-bg);
            min-height: 50vh;
            margin-bottom: -1px; /* Elimina la micro-línea blanca que a veces aparece entre imágenes */
            transition: opacity 0.5s ease;
            opacity: 0; /* Arranca invisible para el efecto de entrada */
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* =========================================
           KNON CONVERSION CARD (El Cierre Inteligente)
           ========================================= */
        .conversion-card {
            padding: 60px 30px;
            text-align: center;
            width: 100%;
            background: linear-gradient(180deg, transparent 0%, #050505 20%, #000000 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
        }

        .conversion-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--knon-accent);
            margin-bottom: 10px;
        }

        .conversion-card p {
            font-size: 1rem;
            color: var(--knon-muted);
            margin-bottom: 40px;
            line-height: 1.5;
            max-width: 80%;
        }

        /* El Botón de Acción Principal */
        .btn-premium {
            display: inline-block;
            background-color: var(--knon-brand);
            color: #000; /* Texto oscuro sobre el botón brillante para máximo contraste */
            padding: 18px 40px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            border-radius: 8px; /* Bordes ligeramente curvos, no redondos, más serios */
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .btn-premium:hover, .btn-premium:active {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
        }

        /* La Firma de Autor en el Footer */
        .knon-footer {
            width: 100%;
            text-align: center;
            padding: 30px 0;
            font-size: 0.75rem;
            color: var(--knon-muted);
            background-color: #000;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .knon-footer span {
            color: var(--knon-brand);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="gallery-container">
        </div>

    <script>
        // 1. EL MOLDE: JSON Simulado (Esto en el futuro vendrá de tu Worker)
        const mockData = {
            creator: "María VIP",
            conversion_link: "https://onlyfans.com/ejemplo",
            items: [
                { id: 1, type: "image", src: "https://via.placeholder.com/600x900/222/fff?text=Foto+1" },
                { id: 2, type: "image", src: "https://via.placeholder.com/600x900/333/fff?text=Foto+2" },
                // Video de prueba open source (El espejismo/poster actúa antes de que cargue)
                { id: 3, type: "video", src: "https://www.w3schools.com/html/mov_bbb.mp4", poster: "https://via.placeholder.com/600x900/111/fff?text=Cargando+Video..." },
                { id: 4, type: "image", src: "https://via.placeholder.com/600x1200/222/fff?text=Foto+3+(Larga)" },
                { id: 5, type: "video", src: "https://www.w3schools.com/html/mov_bbb.mp4", poster: "https://via.placeholder.com/600x900/111/fff?text=Cargando+Video+2..." }
            ]
        };

        const container = document.getElementById('gallery-container');

        // 2. EL CONSTRUCTOR: Renderiza el HTML basado en el JSON
        function renderGallery(data) {
            data.items.forEach(item => {
                let element;
                if (item.type === 'image') {
                    element = document.createElement('img');
                    element.src = item.src;
                    element.className = 'media-item';
                    element.loading = "lazy"; // Inteligencia nativa: solo carga si está cerca
                } else if (item.type === 'video') {
                    element = document.createElement('video');
                    element.src = item.src;
                    element.poster = item.poster; // La Fase 2: El Espejismo visual
                    element.className = 'media-item';
                    element.muted = true; // REGLA DE ORO: Debe estar silenciado para el Autoplay
                    element.loop = true;
                    element.playsInline = true; // Vital para iOS (no abre pantalla completa)
                }
                container.appendChild(element);
            });

            // Añadir la tarjeta de conversión al final
            const endCard = document.createElement('div');
            endCard.className = 'conversion-card';
            endCard.innerHTML = `
                <h2>¿Te gustó el contenido de ${data.creator}?</h2>
                <p>Desbloquea la galería completa y videos sin censura.</p>
                <a href="${data.conversion_link}" class="btn-premium">Suscríbete ahora</a>
            `;
            container.appendChild(endCard);

            // Añadir la firma Knon al final de todo
            const footer = document.createElement('div');
            footer.className = 'knon-footer';
            footer.innerHTML = `Architecture by <span>Knon Grid</span>`;
            container.appendChild(footer);
        }

        renderGallery(mockData);

        // 3. EL CEREBRO: Reproducción por Foco (Intersection Observer)
        // Configuramos la "Zona Caliente"
        const observerOptions = {
            root: null, // Usa el viewport del navegador
            rootMargin: '0px',
            threshold: 0.6 // El 60% del video debe estar visible en pantalla para activarse
        };

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                
                // Fase 3: Interacción y Reproducción
                if (entry.isIntersecting) {
                    // Entró a la Zona Caliente
                    video.play().catch(error => {
                        console.log("El navegador bloqueó el autoplay:", error);
                    });
                } else {
                    // Fase 4: Destrucción/Pausa al salir de la zona
                    video.pause();
                }
            });
        }, observerOptions);

        // Activamos el "Ojo" del observer en todos los videos generados
        const allVideos = document.querySelectorAll('video');
        allVideos.forEach(video => {
            videoObserver.observe(video);
            
            // Un pequeño extra de UX: Si el usuario toca el video, activa el sonido
            video.addEventListener('click', () => {
                video.muted = !video.muted;
            });
        });

    </script>
</body>
</html>
