<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOGLE | Biblioteca de Fotos Exclusiva</title>
    
    <meta name="description" content="Galería de modelos femeninas y contenido exclusivo. Acceso premium a fotos y videos.">
    <meta property="og:title" content="NOGLE | Biblioteca de Fotos">
    <meta property="og:description" content="Contenido exclusivo y galerías premium.">
    <meta property="og:image" content="URL_DE_TU_LOGO_O_PORTADA_AQUI.jpg">
    
    <link rel="stylesheet" href="css/knon-theme.css">

    <style>
        /* Escudo Anti-Interacción */
        body { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        
        /* Bloqueo de imágenes para evitar presionar y guardar */
        .knon-card img { pointer-events: none; }

        /* Efecto Anti-Screenshot (Capa negra y borrosa) */
        .sc-protect { transition: filter 0.3s ease, opacity 0.3s ease; }
        .anti-screenshot-active {
            filter: blur(20px) brightness(0.1);
            opacity: 0.2;
            pointer-events: none;
        }

        /* Snapshot Oculto (SEO para posicionamiento) */
        .snapshot-fantasma {
            opacity: 0; height: 0; overflow: hidden; margin: 0; padding: 0; position: absolute; pointer-events: none;
        }

        /* Marca de Agua Central e Imborrable */
        .watermark-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            font-style: italic;
            color: rgba(255, 255, 255, 0.18); /* Blanco semi-transparente */
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.2); /* Ligero brillo rosa */
            pointer-events: none; /* Crucial para que no estorbe los clics */
            z-index: 10;
            letter-spacing: 5px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body class="sc-protect" id="nogle-body">

    <section class="snapshot-fantasma">
        <h1>NOGLE Galería Exclusiva</h1>
        <h2>Las mejores fotos y videos de modelos.</h2>
        <p>Disfruta de nuestra biblioteca privada con el reproductor de alta seguridad Knon Ecosystem.</p>
    </section>

    <header class="knon-header">
        <div class="logo-wrapper">
            <div class="logo-nogle">
                <span class="l-1">N</span><span class="l-2">O</span><span class="l-3">G</span><span class="l-4">L</span><span class="l-5">E</span>
            </div>
            <div class="logo-sub">BIBLIOTECA DE FOTOS</div>
        </div>
    </header>

    <main id="app-context">
        <div id="main-content">
            <div class="knon-grid">
                
                <a href="visor.html" class="knon-card" style="text-decoration: none; display: block;">
                    <div style="position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden;">
                        <img src="https://via.placeholder.com/600x800/111/fff?text=Maria+Portada" loading="lazy" alt="María VIP" style="width: 100%; height: 100%; object-fit: cover;">
                        <div class="watermark-center">NOGLE</div>
                        <div class="badge">NUEVA</div>
                    </div>
                    <div class="info">
                        <h3>María VIP</h3>
                        <p>24 Fotos • 3 Videos</p>
                    </div>
                </a>

                <a href="visor.html" class="knon-card" style="text-decoration: none; display: block;">
                    <div style="position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden;">
                        <img src="https://via.placeholder.com/600x800/222/fff?text=Sofia+Portada" loading="lazy" alt="Sofia Luxury" style="width: 100%; height: 100%; object-fit: cover;">
                        <div class="watermark-center">NOGLE</div>
                        <div class="badge">POPULAR</div>
                    </div>
                    <div class="info">
                        <h3>Sofia Luxury</h3>
                        <p>12 Fotos • 1 Video</p>
                    </div>
                </a>

            </div>
        </div>
    </main>

    <nav class="knon-nav">
        <div class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Inicio</span>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>Buscar</span>
        </div>
    </nav>

    <script>
        // 1. Bloquear el clic derecho / menú desplegable al dejar presionado
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // 2. Sistema Anti-Screenshot / Gestor de Tareas
        document.addEventListener('visibilitychange', () => {
            const body = document.getElementById('nogle-body');
            if (document.visibilityState === 'hidden') {
                // El usuario intentó salir de la app o abrir el gestor de ventanas
                body.classList.add('anti-screenshot-active');
            } else {
                // El usuario regresó a la pantalla activa
                setTimeout(() => {
                    body.classList.remove('anti-screenshot-active');
                }, 400); // Pequeño retraso para evitar ráfagas de capturas
            }
        });
    </script>
</body>
</html>
