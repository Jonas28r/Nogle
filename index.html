<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOGLE | Premium Exclusive</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:italic&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --accent: #ff3366;
            
            /* Paleta Femenina Premium para las letras */
            --nogle-n: #FF66B2; /* Rosa Brillante */
            --nogle-o: #FF99CC; /* Rosa Pastel */
            --nogle-g: #D4AF37; /* Dorado Nogle */
            --nogle-l: #CC99FF; /* Lavanda suave */
            --nogle-e: #FF3366; /* Rosa Accent */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        /* Estilo base para el título */
        header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 3.5rem;
            letter-spacing: -1px;
            /* Quitamos el degradado antiguo metálico */
            background: none;
            -webkit-background-clip: initial;
            -webkit-text-fill-color: initial;
        }

        /* Colores individuales para cada letra con brillo elegante */
        header h1 span { text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .l-n { color: var(--nogle-n); }
        .l-o { color: var(--nogle-o); }
        .l-g { color: var(--nogle-g); }
        .l-l { color: var(--nogle-l); }
        .l-e { color: var(--nogle-e); }

        /* La Cuadrícula Mágica */
        .knon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .knon-card {
            position: relative;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.3s;
        }

        .img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #1a1a1a;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Marca de Agua en la Portada */
        .watermark-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 2.5rem;
            font-weight: 900;
            color: rgba(255,255,255,0.1);
            pointer-events: none;
            letter-spacing: 5px;
            white-space: nowrap;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 2px;
        }

        .info { padding: 12px; }
        .info h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info p { font-size: 11px; color: #777; }

        /* Loader */
        #loader {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>
            <span class="l-n">N</span><span class="l-o">O</span><span class="l-g">G</span><span class="l-l">L</span><span class="l-e">E</span>
        </h1>
    </header>

    <main class="knon-grid" id="main-catalog">
        <div id="loader">CONECTANDO CON EL ECOSISTEMA...</div>
    </main>

    <script>
        // URL de tu Worker de Cloudflare ya vinculada
        const WORKER_URL = 'https://nogle-knon.villajonas09.workers.dev/';

        async function initCatalog() {
            const container = document.getElementById('main-catalog');
            
            try {
                const response = await fetch(WORKER_URL);
                const modelos = await response.json();
                
                container.innerHTML = ''; // Limpiar loader

                modelos.forEach(m => {
                    // Enlace limpio sin .html
                    const card = `
                        <a href="visor?m=${m.id}" class="knon-card">
                            <div class="img-container">
                                <img src="${m.cover}" alt="${m.name}" loading="lazy" crossorigin="anonymous">
                                <div class="watermark-center">NOGLE</div>
                                <div class="badge">PREMIUM</div>
                            </div>
                            <div class="info">
                                <h3>${m.name}</h3>
                                <p>VER CONTENIDO</p>
                            </div>
                        </a>
                    `;
                    container.insertAdjacentHTML('beforeend', card);
                });

            } catch (error) {
                container.innerHTML = `
                    <div id="loader" style="color:#555;">
                        SISTEMA EN MANTENIMIENTO<br>
                        <small>Estamos preparando contenido nuevo</small>
                    </div>
                `;
                console.error("Error al conectar con el ecosistema:", error);
            }
        }

        initCatalog();
    </script>
</body>
</html>
