<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>NOGLE | Premium Exclusive</title>
    <meta name="description" content="Catálogo exclusivo de contenido multimedia premium y actualizaciones diarias.">
    
    <link rel="canonical" href="https://nogle.vercel.app/" />

    <meta property="og:title" content="NOGLE | Premium Exclusive">
    <meta property="og:description" content="Acceso al ecosistema multimedia más exclusivo.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nogle.vercel.app/">
    <meta property="og:image" content="https://nogle.vercel.app/logo-nogle.png">
    <meta name="rating" content="adult">
    <meta name="rating" content="RTA-5042-1996-1400-1577-RTA">

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:italic&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark: #0a0a0a;
            --accent: #ff3366;
            --nogle-pink-hot: #ff1493;   
            --nogle-purple-rich: #9400d3; 
            --new-tag: #00f2ff; /* Cian eléctrico para novedades */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        body.modal-open { overflow: hidden; }

        header { padding: 40px 20px; text-align: center; }

        header h1, .logo-nogle {
            font-family: 'Instrument Serif', serif;
            font-size: 3.5rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--nogle-pink-hot) 0%, var(--nogle-purple-rich) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(148, 0, 211, 0.4);
        }

        .knon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
            flex-grow: 1; 
        }

        .knon-card {
            position: relative;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.3s;
        }

        .img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #1a1a1a;
        }

        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Marca de agua sutil */
        .watermark-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 2.5rem; font-weight: 900;
            color: rgba(255,255,255,0.08);
            pointer-events: none; letter-spacing: 5px;
        }

        /* Badges Dinámicos */
        .badge {
            position: absolute; top: 10px; right: 10px;
            font-size: 9px; font-weight: 900;
            padding: 4px 10px; border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }

        .badge-free { background: var(--accent); color: white; }
        
        .badge-new { 
            background: var(--new-tag); 
            color: black;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); }
        }

        .info { padding: 12px; }
        .info h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 700; }
        .info p { font-size: 10px; color: #555; letter-spacing: 1px; }

        #loader { grid-column: 1 / -1; text-align: center; padding: 50px; font-size: 11px; color: #444; letter-spacing: 3px; }

        .nogle-footer { margin-top: 50px; padding: 40px 20px 20px; background-color: #070707; border-top: 1px solid rgba(255, 255, 255, 0.05); text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 25px; }
        .footer-links a { color: #555; text-decoration: none; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; }
        .footer-signature { font-family: 'Instrument Serif', serif; font-size: 1.2rem; font-style: italic; color: #bbaea0; opacity: 0.6; margin-top: 15px; }

        /* Modal +18 */
        .age-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 3, 3, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; transition: opacity 0.6s ease; }
        .age-overlay.hidden { opacity: 0; pointer-events: none; }
        .age-box { background: #0c0c0c; border: 1px solid rgba(255, 20, 147, 0.15); border-radius: 20px; padding: 45px 30px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .age-text { font-size: 0.85rem; color: #888; line-height: 1.6; margin-bottom: 35px; }
        .btn-yes { background: linear-gradient(90deg, var(--nogle-pink-hot), var(--nogle-purple-rich)); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; letter-spacing: 1px; margin-bottom: 15px; }
        .btn-no { background: transparent; color: #444; border: 1px solid #222; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body class="modal-open">

    <div id="age-verification-modal" class="age-overlay">
        <div class="age-box">
            <h2 class="logo-nogle" style="font-size: 3rem; margin-bottom: 10px;">NOGLE</h2>
            <p style="font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.4rem; margin-bottom: 20px;">Private Access</p>
            <p class="age-text">Confirma que eres mayor de 18 años para acceder al contenido exclusivo del ecosistema Knon.</p>
            <button class="btn-yes" onclick="acceptAge()">ENTRAR AL ECOSISTEMA</button>
            <button class="btn-no" onclick="window.location.href='https://google.com'">SALIR</button>
        </div>
    </div>

    <header>
        <h1 class="logo-nogle">NOGLE</h1>
    </header>

    <main class="knon-grid" id="main-catalog">
        <div id="loader">ESTABLECIENDO CONEXIÓN SEGURA...</div>
    </main>

    <footer class="nogle-footer">
        <div class="footer-links">
            <a href="legal.html#privacy">Políticas</a>
            <a href="legal.html#terms">Términos</a>
            <a href="legal.html#dmca">DMCA</a>
        </div>
        <div class="footer-copyright" style="color: #333; font-size: 10px; margin-top: 20px;">&copy; 2026 NOGLE. ALL RIGHTS RESERVED.</div>
        <div class="footer-signature">By Knon</div>
    </footer>

    <script>
        // 1. Lógica de Edad
        function acceptAge() {
            localStorage.setItem('nogle_age_verified', 'true');
            document.getElementById('age-verification-modal').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }
        if (localStorage.getItem('nogle_age_verified') === 'true') {
            document.getElementById('age-verification-modal').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        // 2. Carga Dinámica con Detección de Novedades
        const WORKER_URL = 'https://nogle-knon.villajonas09.workers.dev/';

        function isRecent(dateString) {
            if (!dateString) return false;
            const uploadDate = new Date(dateString);
            const now = new Date();
            const diffInHours = (now - uploadDate) / (1000 * 60 * 60);
            return diffInHours < 72; // Marca como nuevo por 3 días
        }

        async function initCatalog() {
            const container = document.getElementById('main-catalog');
            
            try {
                // El worker ahora nos envía la fecha de la última actualización real
                const response = await fetch(WORKER_URL + 'catalogo.json');
                const modelos = await response.json();
                
                container.innerHTML = ''; 

                modelos.forEach(m => {
                    const fresh = isRecent(m.date);
                    
                    const card = `
                        <a href="visor?m=${m.id}" class="knon-card" title="Explorar contenido de ${m.name}">
                            <div class="img-container">
                                <img src="${m.cover}" alt="Exclusivo ${m.name}" loading="lazy" crossorigin="anonymous">
                                <div class="watermark-center">NOGLE</div>
                                ${fresh ? '<div class="badge badge-new">NUEVO</div>' : '<div class="badge badge-free">GRATIS</div>'}
                            </div>
                            <div class="info">
                                <h2>${m.name}</h2>
                                <p>${fresh ? 'ACTUALIZADO RECIENTEMENTE' : 'CONTENIDO DISPONIBLE'}</p>
                            </div>
                        </a>
                    `;
                    container.insertAdjacentHTML('beforeend', card);
                });

            } catch (error) {
                container.innerHTML = `<div id="loader" style="color:red;">FALLO EN LA CONEXIÓN</div>`;
            }
        }

        initCatalog();
    </script>
</body>
</html>
