<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>NOGLE | Premium Exclusive</title>
    <meta name="description" content="Catálogo exclusivo de contenido multimedia premium.">
    
    <meta name="rating" content="adult">
    <meta name="rating" content="RTA-5042-1996-1400-1577-RTA">
    
    <meta http-equiv="Cache-Control" content="no-store">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NOGLE",
      "description": "Plataforma premium exclusiva",
      "isFamilyFriendly": "False"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:italic&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --accent: #ff3366;
            
            /* Paleta de Degradado Premium de la Imagen */
            --nogle-pink-hot: #ff1493;   /* Rosa intenso de la imagen */
            --nogle-purple-rich: #9400d3; /* Morado vibrante de la imagen */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 3.5rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--nogle-pink-hot) 0%, var(--nogle-purple-rich) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(148, 0, 211, 0.4);
        }

        /* La Cuadrícula Mágica */
        .knon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
            flex-grow: 1; /* Permite que el contenido empuje el footer hacia abajo */
        }

        .knon-card {
            position: relative;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.3s;
        }

        .img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #1a1a1a;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .watermark-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 2.5rem;
            font-weight: 900;
            color: rgba(255,255,255,0.1);
            pointer-events: none;
            letter-spacing: 5px;
            white-space: nowrap;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 2px;
        }

        .info { padding: 12px; }
        
        /* H2 en lugar de H3 para mejor semántica SEO en el listado */
        .info h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: normal; }
        .info p { font-size: 11px; color: #777; }

        #loader {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 2px;
        }

        /* ========================================== */
        /* ESTILOS DEL FOOTER PROFESIONAL */
        /* ========================================== */
        .nogle-footer {
            margin-top: 50px;
            padding: 40px 20px 20px;
            background-color: #070707;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--nogle-pink-hot);
        }

        .footer-copyright {
            color: #444;
            font-size: 11px;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .footer-signature {
            font-family: 'Instrument Serif', serif;
            font-size: 1.2rem;
            font-style: italic;
            /* Color natural y relajado (Piedra/Arena Suave) */
            color: #bbaea0; 
            letter-spacing: 1px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <h1>NOGLE</h1>
    </header>

    <main class="knon-grid" id="main-catalog">
        <div id="loader">CONECTANDO CON EL ECOSISTEMA...</div>
    </main>

    <footer class="nogle-footer">
        <div class="footer-links">
            <a href="/privacy">Políticas de Privacidad</a>
            <a href="/terms">Términos de Uso</a>
            <a href="/dmca">DMCA</a>
        </div>
        <div class="footer-copyright">
            &copy; 2026 NOGLE. Todos los derechos reservados.
        </div>
        <div class="footer-signature">
            By Knon
        </div>
    </footer>

    <script>
        const WORKER_URL = 'https://nogle-knon.villajonas09.workers.dev/';

        async function initCatalog() {
            const container = document.getElementById('main-catalog');
            
            try {
                const response = await fetch(WORKER_URL);
                const modelos = await response.json();
                
                container.innerHTML = ''; 

                modelos.forEach(m => {
                    // Semántica SEO: Cambiado el <h3> de la tarjeta a <h2>. 
                    // El atributo alt se nutre de la API dinámicamente.
                    const card = `
                        <a href="visor?m=${m.id}" class="knon-card">
                            <div class="img-container">
                                <img src="${m.cover}" alt="Contenido exclusivo de ${m.name}" loading="lazy" crossorigin="anonymous">
                                <div class="watermark-center">NOGLE</div>
                                <div class="badge">PREMIUM</div>
                            </div>
                            <div class="info">
                                <h2>${m.name}</h2>
                                <p>VER CONTENIDO</p>
                            </div>
                        </a>
                    `;
                    container.insertAdjacentHTML('beforeend', card);
                });

            } catch (error) {
                container.innerHTML = `
                    <div id="loader" style="color:#555;">
                        SISTEMA EN MANTENIMIENTO<br>
                        <small>Estamos preparando contenido nuevo</small>
                    </div>
                `;
                console.error("Error al conectar con el ecosistema:", error);
            }
        }

        initCatalog();
    </script>
</body>
</html>
