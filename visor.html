<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>NOGLE | Visor Premium</title>
    <meta name="description" content="Visor multimedia exclusivo. Contenido premium de alta calidad.">
    <meta name="robots" content="index, follow">
    
    <meta name="rating" content="adult">
    <meta name="rating" content="RTA-5042-1996-1400-1577-RTA">
    
    <link rel="stylesheet" href="css/knon-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:italic&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos específicos del Visor de Lujo */
        body { background-color: #030303; -webkit-user-select: none; user-select: none; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .sc-protect { transition: filter 0.3s ease, opacity 0.3s ease; }
        .anti-screenshot-active { filter: blur(20px) brightness(0.1); opacity: 0.2; }

        /* Contenedor de Medios */
        #gallery-container { width: 100%; display: flex; flex-direction: column; gap: 2px; padding-top: 85px; flex-grow: 1; }
        .media-item { width: 100%; position: relative; background: #080808; overflow: hidden; }
        .media-item img, .media-item video { width: 100%; display: block; pointer-events: none; }
        
        /* Marca de Agua Dinámica */
        .watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-25deg);
            font-family: 'Inter', sans-serif; font-weight: 900; color: rgba(255,255,255,0.12);
            font-size: 2.5rem; pointer-events: none; z-index: 5; letter-spacing: 5px;
        }

        /* Sección de Calificación Inteligente */
        #rating-section {
            padding: 50px 20px; text-align: center; background: linear-gradient(to bottom, #030303, #0a0a0a);
            border-top: 1px solid rgba(255, 51, 102, 0.1);
        }
        .rating-title { font-family: 'Instrument Serif', serif; font-style: italic; color: #f5f5f5; font-size: 1.3rem; margin-bottom: 15px; }
        .stars { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .star { font-size: 2.2rem; color: #222; cursor: pointer; transition: all 0.3s; }
        .star.active { color: #FF3366; text-shadow: 0 0 15px rgba(255, 51, 102, 0.6); transform: scale(1.2); }

        #btn-subscribe {
            display: none; width: 85%; max-width: 350px; margin: 0 auto;
            background: linear-gradient(90deg, #FF3366, #9400d3); color: white;
            padding: 18px; border-radius: 15px; text-decoration: none; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Navegación Inteligente y Título Degradado */
        .nav-header {
            position: fixed; top: 0; width: 100%; height: 75px; z-index: 1000;
            background: rgba(3, 3, 3, 0.8); backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .btn-back { color: #f5f5f5; text-decoration: none; font-size: 1.5rem; }
        
        .logo-nogle {
            font-family: 'Instrument Serif', serif;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(90deg, #ff1493 0%, #9400d3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text; color: transparent;
            text-shadow: 0 0 15px rgba(148, 0, 211, 0.4);
        }

        #btn-next {
            display: none; margin: 30px auto; color: #ff1493; border: 1px solid #ff1493;
            padding: 10px 25px; border-radius: 30px; font-size: 0.8rem; font-weight: bold;
            background: transparent; text-transform: uppercase; letter-spacing: 2px;
        }

        /* Footer Profesional */
        .nogle-footer { padding: 40px 20px 20px; background-color: #070707; border-top: 1px solid rgba(255, 255, 255, 0.05); text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 25px; }
        .footer-links a { color: #666; text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; transition: color 0.3s ease; }
        .footer-links a:hover { color: #ff1493; }
        .footer-copyright { color: #444; font-size: 11px; margin-bottom: 15px; letter-spacing: 0.5px; }
        .footer-signature { font-family: 'Instrument Serif', serif; font-size: 1.2rem; font-style: italic; color: #bbaea0; letter-spacing: 1px; opacity: 0.8; }

        /* ========================================== */
        /* CLASE MAESTRA SEO (Invisible al usuario, visible al Bot) */
        /* ========================================== */
        .seo-reader-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body class="sc-protect" id="nogle-visor">

    <header class="nav-header">
        <a href="index.html" class="btn-back">✕</a>
        <h1 class="logo-nogle" style="font-size: 2.5rem;">NOGLE</h1> <div style="width: 30px;"></div> 
    </header>

    <div id="seo-injection-container" class="seo-reader-only"></div>

    <main id="gallery-container">
        </main>

    <button id="btn-next" onclick="loadMore()">Cargar más contenido</button>

    <section id="rating-section">
        <p class="rating-title">¿Te gustó el contenido?</p>
        <div class="stars" id="star-box">
            <span class="star" onclick="vote(1)">★</span><span class="star" onclick="vote(2)">★</span>
            <span class="star" onclick="vote(3)">★</span><span class="star" onclick="vote(4)">★</span>
            <span class="star" onclick="vote(5)">★</span>
        </div>
        <a href="#" id="btn-subscribe">Suscríbete para ver más</a>
    </section>

    <footer class="nogle-footer">
        <div class="footer-links">
            <a href="legal.html#privacy">Políticas de Privacidad</a>
            <a href="legal.html#terms">Términos de Uso</a>
            <a href="legal.html#dmca">DMCA</a>
        </div>
        <div class="footer-copyright">
            &copy; 2026 NOGLE. Todos los derechos reservados.
        </div>
        <div class="footer-signature">
            By Knon
        </div>
    </footer>

    <script>
        (function injectDynamicSEO() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('m');

            if (slug) {
                // Limpiar el slug (ej. "la-vivi-manaba" -> "LA VIVI MANABA")
                const cleanName = slug.replace(/-/g, ' ').toUpperCase();
                const titleCaseName = slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                
                const currentUrl = `https://nogle.vercel.app/visor?m=${slug}`;

                // 1. Sobrescribir Head Meta Tags
                document.title = `Contenido Exclusivo de ${titleCaseName} | NOGLE`;
                
                let metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) metaDesc.content = `Disfruta de la galería premium de ${titleCaseName}. Fotos y videos exclusivos de alta calidad solo en NOGLE.`;

                // 2. Canonical Tag
                let canonicalTag = document.querySelector('link[rel="canonical"]');
                if (!canonicalTag) {
                    canonicalTag = document.createElement('link');
                    canonicalTag.rel = 'canonical';
                    document.head.appendChild(canonicalTag);
                }
                canonicalTag.href = currentUrl;

                // 3. Crear Estructura Semántica para el Bot (El texto que Google "leerá")
                const seoContainer = document.getElementById('seo-injection-container');
                seoContainer.innerHTML = `
                    <h1>Galería y Contenido Premium de ${titleCaseName}</h1>
                    <h2>Fotos y videos exclusivos de OnlyFans creadores</h2>
                    <p>Bienvenido a la galería oficial de <strong>${titleCaseName}</strong> en NOGLE. Aquí encontrarás el mejor catálogo de contenido multimedia, fotos en alta resolución y videos premium. Nuestro ecosistema exclusivo te garantiza acceso directo al material más reciente de creadoras de contenido. Explora la colección completa de ${cleanName} de forma segura y rápida.</p>
                `;

                // 4. Inyección JSON-LD (Schema.org)
                const schema = {
                    "@context": "https://schema.org",
                    "@type": "ImageGallery",
                    "name": `Galería Premium de ${titleCaseName}`,
                    "description": `Catálogo exclusivo de fotos y videos de ${titleCaseName}.`,
                    "url": currentUrl,
                    "publisher": {
                        "@type": "Organization",
                        "name": "NOGLE by Knon"
                    }
                };
                
                const scriptLd = document.createElement('script');
                scriptLd.type = "application/ld+json";
                scriptLd.text = JSON.stringify(schema);
                document.head.appendChild(scriptLd);
            }
        })();
    </script>

    <script src="js/KnonPlayer.js"></script>
    
    <script>
        function vote(n) {
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, index) => {
                if(index < n) s.classList.add('active'); else s.classList.remove('active');
            });
            // La siguiente línea ha sido comentada para mantener la plataforma 100% gratuita temporalmente
            // document.getElementById('btn-subscribe').style.display = 'block';
            if(window.navigator.vibrate) window.navigator.vibrate(50);
        }
        
        // Protección anti-screenshot mediante blur
        document.addEventListener('visibilitychange', () => {
            const body = document.getElementById('nogle-visor');
            if (document.visibilityState === 'hidden') body.classList.add('anti-screenshot-active');
            else setTimeout(() => body.classList.remove('anti-screenshot-active'), 400);
        });
        
        // Deshabilitar click derecho
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
