        }
        
        const b = document.createElement('div');
        b.className = 'ads ad adsbox doubleclick ad-placement carbon-ads';
        b.innerHTML = '&nbsp;';
        b.style.position = 'absolute';
        b.style.top = '-9999px';

        document.body.appendChild(b);
        setTimeout(() => {
            if(b.offsetHeight === 0 || window.getComputedStyle(b).display === 'none') block();

        const s = document.createElement('script');
        s.onerror = () => { block(); };
        s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js";

    <script>
        // --- UI DEL BOTÓN FLOTANTE (Solo animaciones y físicas) ---
        const fabContainer = document.getElementById('knon-fab-container');
        const fabTrigger = document.getElementById('knon-fab-trigger');
        const fabOptions = document.getElementById('knon-fab-options');
        const fabGallery = document.getElementById('knon-fab-gallery');

        let longPressTimer;
        let isDragging = false;
        let startTouchX, startTouchY;
        let initialOffsetX, initialOffsetY;

        fabTrigger.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startTouchX = touch.clientX;
            startTouchY = touch.clientY;
            
            const rect = fabContainer.getBoundingClientRect();
            initialOffsetX = touch.clientX - rect.left;
            initialOffsetY = touch.clientY - rect.top;
            
            isDragging = false; 

            longPressTimer = setTimeout(() => {
                if(!isDragging) {
                    fabOptions.style.display = 'flex';
                    fabGallery.style.display = 'none';
                    if(navigator.vibrate) navigator.vibrate(50);
                }
            }, 800);
        }, { passive: false });

        fabTrigger.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const moveX = Math.abs(touch.clientX - startTouchX);
            const moveY = Math.abs(touch.clientY - startTouchY);

            if (moveX > 10 || moveY > 10) {
                isDragging = true;
                clearTimeout(longPressTimer); 
                fabOptions.style.display = 'none'; 
                e.preventDefault(); 

                fabContainer.style.left = `${touch.clientX - initialOffsetX}px`;
                fabContainer.style.top = `${touch.clientY - initialOffsetY}px`;
                fabContainer.style.bottom = 'auto'; 
                fabContainer.style.right = 'auto';
            }
        }, { passive: false });

        fabTrigger.addEventListener('touchend', (e) => {
            clearTimeout(longPressTimer);
        });

        // EL CLIC QUE ABRE EL MENÚ
        fabTrigger.addEventListener('click', (e) => {
            if (isDragging) {
                setTimeout(() => isDragging = false, 50);
                return; 
            }
            
            if (fabGallery.style.display === 'flex') {
                fabGallery.style.display = 'none';
            } else {
                // ANTES de mostrar el menú, actualizamos las URLs al link decodificado más reciente
                if(typeof KnonPlayer !== 'undefined') KnonPlayer.updateMenuLinks();
                
                fabGallery.style.display = 'flex';
                fabOptions.style.display = 'none';
            }
        });

        document.getElementById('btn-quitar').addEventListener('click', () => {
            fabContainer.remove();
        });

        // Extras de seguridad visual
        function vote(n) {
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, index) => {
                if(index < n) s.classList.add('active'); else s.classList.remove('active');
            });
            if(window.navigator.vibrate) window.navigator.vibrate(50);
        }
        
        document.addEventListener('visibilitychange', () => {
            const body = document.getElementById('nogle-visor');
            if (document.visibilityState === 'hidden') body.classList.add('anti-screenshot-active');
            else setTimeout(() => body.classList.remove('anti-screenshot-active'), 400);
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Inyección de script In-stream
        window.addEventListener('load', function() {
            setTimeout(function() {
                const inCode = document.getElementById('ad-instream');
                if(inCode && inCode.textContent.trim()) {
                    const scriptIn = document.createElement('script');
                    scriptIn.setAttribute('data-cfasync', 'false');
                    scriptIn.textContent = inCode.textContent.trim();
                    document.body.appendChild(scriptIn);
                }
            }, 3500);
        });
    </script>
